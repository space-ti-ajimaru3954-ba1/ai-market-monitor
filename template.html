<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FANG+ Sentinel Ver 17.0 - Strategy Edition</title>
  <style>
    :root {
      --bg: #030406; --panel: #0d111a; --ink: #f1f5f9; --muted: #64748b;
      --line: #1e293b; --green: #10b981; --yellow: #f59e0b; --orange: #f97316;
      --red: #ef4444; --purple: #a855f7; --blue: #3b82f6; --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, sans-serif; }
    
    .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    
    /* サイドバーの修正：ボタンを目立たせる */
    aside { 
      padding: 30px 20px; 
      border-right: 1px solid var(--line); 
      background: #000; 
      position: sticky; 
      top: 0; 
      height: 100vh; 
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-group { margin: 20px 0; }
    
    .nav-btn { 
      width: 100%; 
      padding: 14px 16px; 
      margin-bottom: 12px; 
      border-radius: 10px; 
      border: 1px solid var(--line); 
      background: #1a1f26; /* ボタンの背景色を少し明るく */
      color: var(--ink); 
      cursor: pointer; 
      text-align: left; 
      font-weight: bold; 
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }
    .nav-btn:hover { background: #2d353f; border-color: var(--blue); }
    .nav-btn.active { 
      background: var(--blue); 
      border-color: var(--blue); 
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    main { padding: 40px; max-width: 1100px; margin: 0 auto; width: 100%; }

    /* メインモニター画面 */
    .hero { padding: 50px; border-radius: 30px; text-align: center; margin-bottom: 30px; border: 1px solid var(--line); transition: 0.5s; }
    .phase-title { font-size: 80px; font-weight: 900; line-height: 1; margin: 15px 0; letter-spacing: -2px; }
    .grid { display: grid; gap: 20px; grid-template-columns: 1fr 1fr; }
    .card { background: var(--panel); padding: 24px; border-radius: 20px; border: 1px solid var(--line); }
    
    /* マニュアル表示 */
    #manual-screen { display: none; }
    .step-box { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; }
    .step-num { width: 35px; height: 35px; border-radius: 50%; background: var(--blue); display: grid; place-items: center; font-weight: bold; flex-shrink: 0; }
    .phase-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .phase-table td, .phase-table th { padding: 15px; border: 1px solid var(--line); text-align: left; }

    .BAD { color: var(--red); font-weight: bold; }
    .OK { color: var(--green); font-weight: bold; }
    .UNKNOWN { color: var(--yellow); font-style: italic; }
    .metric { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
