name: Hourly Market Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install yfinance pandas
      - name: Run monitor
        run: python monitor.py
      - name: Commit and Push
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scores" && git push)
